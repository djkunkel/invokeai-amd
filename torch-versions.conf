# ROCm torch version config for retorch.sh
#
# To try a different nightly, change NIGHTLY (and the base versions if they
# differ for that build). retorch.sh builds the pinned overrides from these.
# Available nightlies: https://rocm.nightlies.amd.com/whl-multi-arch/torch/
#
# NIGHTLY is the ROCm nightly suffix shared by every package in one build.
NIGHTLY="rocm7.14.0a20260619"

# Base versions for this nightly (the part before the +NIGHTLY suffix).
TORCH_VER="2.12.0"
TORCHVISION_VER="0.27.0"

# NOTE: torch >= 2.12.0 is required for flash attention on gfx1201 (R9700) -
# that is the first build that ships the aotriton gfx120x kernel images via
# amd-torch-device-gfx12-0. See retorch.sh for details.
